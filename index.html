<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuotaClara - Calculadora de Préstamos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm p-4" style="border-radius: 12px; background-color: #ffffff;">
                <h2 class="text-center mb-3" style="color: #0056b3; font-weight: bold;">CuotaClara 💸</h2>
                <p class="text-muted text-center mb-4">Calcula tu cuota mensual al instante de forma transparente.</p>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="monto" class="form-label fw-bold">Monto ($):</label>
                        <input type="number" id="monto" class="form-control" value="500000">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="interes" class="form-label fw-bold">Interés Anual (%):</label>
                        <input type="number" id="interes" class="form-control" value="14" step="0.1">
                    </div>

                    <div class="col-md-4 mb-4">
                        <label for="meses" class="form-label fw-bold">Plazo (meses):</label>
                        <input type="number" id="meses" class="form-control" value="60">
                    </div>
                </div>

                <button onclick="calcularCuota()" class="btn btn-primary btn-lg w-100 fw-bold" style="background-color: #0056b3; border: none;">
                    Calcular Cuota
                </button>

                <div id="resultado" class="mt-4 p-3 text-center" style="display: none; background-color: #e6f2ff; border-radius: 8px; border-left: 5px solid #0056b3;">
                    <span class="text-muted d-block mb-1">Tu pago mensual estimado:</span>
                    <h2 id="cuota-mensual" class="fw-bold m-0" style="color: #0056b3;">$0.00</h2>
                </div>

                <div id="tabla-container" class="mt-4" style="display: none;">
                    <h4 class="mb-3 text-center" style="color: #333;">Desglose de Pagos</h4>
                    <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                        <table class="table table-striped table-hover text-center">
                            <thead style="position: sticky; top: 0; background-color: #f8f9fa; z-index: 1;">
                                <tr>
                                    <th>Mes</th>
                                    <th>Cuota</th>
                                    <th>Interés</th>
                                    <th>Capital</th>
                                    <th>Saldo Restante</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-body">
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    function calcularCuota() {
        let V = parseFloat(document.getElementById('monto').value);
        let interesAnual = parseFloat(document.getElementById('interes').value);
        let n = parseFloat(document.getElementById('meses').value);

        if (isNaN(V) || isNaN(interesAnual) || isNaN(n) || V <= 0 || n <= 0) {
            alert("Por favor, ingresa valores válidos.");
            return;
        }

        let i = (interesAnual / 100) / 12;
        let C = V * (i * Math.pow(1 + i, n)) / (Math.pow(1 + i, n) - 1);

        document.getElementById('cuota-mensual').innerText = "$" + C.toLocaleString('es-DO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('resultado').style.display = 'block';

        let tbody = document.getElementById('tabla-body');
        tbody.innerHTML = ''; 
        
        let saldo = V;

        for (let mes = 1; mes <= n; mes++) {
            let interesMes = saldo * i;
            let capitalMes = C - interesMes;
            saldo = saldo - capitalMes;

            if (saldo < 0.01) saldo = 0;

            let fila = `<tr>
                <td class="fw-bold">${mes}</td>
                <td>$${C.toLocaleString('es-DO', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                <td class="text-danger">-$${interesMes.toLocaleString('es-DO', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                <td class="text-success">+$${capitalMes.toLocaleString('es-DO', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                <td class="fw-bold">$${saldo.toLocaleString('es-DO', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
            </tr>`;
            
            tbody.innerHTML += fila;
        }

        document.getElementById('tabla-container').style.display = 'block';
    }
</script>
</body>
</html>
