<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuotaClara - Calculadora de Préstamos Inteligente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f4f7f6; 
            color: #2d3748; 
        }
        
        .hero-bg { 
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); 
            padding: 60px 0 120px 0; 
            color: white; 
            text-align: center;
        }

        .glass-card { 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            margin-top: -80px; 
            border: none; 
            z-index: 10; 
            position: relative; 
            padding: 40px;
        }

        .form-label { font-weight: 600; color: #4a5568; }
        .input-group-text { background-color: #f8fafc; border: 2px solid #e2e8f0; border-right: none; color: #4fd1c5; }
        .form-control { border: 2px solid #e2e8f0; border-left: none; box-shadow: none !important; padding: 12px; font-weight: 600; color: #2d3748; }
        .form-control:focus { border-color: #e2e8f0; background-color: #f8fafc; }

        /* Estilos para los nuevos botones de selección */
        .btn-outline-custom {
            color: #38b2ac;
            border-color: #38b2ac;
            font-weight: 600;
            padding: 10px;
        }
        .btn-outline-custom:hover {
            background-color: rgba(56, 178, 172, 0.1);
            color: #319795;
        }
        .btn-check:checked + .btn-outline-custom {
            background-color: #38b2ac;
            color: white;
            border-color: #38b2ac;
            box-shadow: 0 4px 10px rgba(56, 178, 172, 0.3);
        }

        .btn-calc { 
            background: linear-gradient(135deg, #38b2ac 0%, #319795 100%); 
            border: none; color: white; padding: 16px; border-radius: 12px; 
            font-weight: 700; font-size: 1.2rem; transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(49, 151, 149, 0.3); 
        }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(49, 151, 149, 0.4); color: white; }

        .result-box { 
            background: linear-gradient(135deg, #f0fff4 0%, #e6fffa 100%); 
            border: 2px solid #c6f6d5; border-radius: 16px; padding: 25px;
            animation: fadeIn 0.8s ease-in-out;
        }
        .text-gradient { 
            background: linear-gradient(135deg, #2c7a7b, #319795); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-size: 2.5rem;
        }

        .table thead th { background-color: #edf2f7; color: #4a5568; border-bottom: none; padding: 15px; }
        .table td { vertical-align: middle; padding: 15px; border-bottom: 1px solid #edf2f7; }
        
        .seo-section { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 40px; margin-top: 40px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in-section { animation: fadeIn 0.8s ease-in-out; }
    </style>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4795984440043236" crossorigin="anonymous"></script>
    <meta property="og:title" content="Calculadora de Préstamos CuotaClara | Planifica tus finanzas en RD">
    <meta property="og:description" content="Simula tus préstamos bancarios, vehículos o personales de forma rápida, visual y sin sorpresas. ¡Entérate cuánto pagarás realmente!">
    <meta property="og:url" content="https://cuotaclara.me/">
    <meta property="og:type" content="website">
</head>
<body>

    <div class="hero-bg">
        <div class="container">
            <h1 class="fw-bold"><i class="fa-solid fa-wallet me-2"></i> CuotaClara</h1>
            <p class="lead" style="opacity: 0.9;">Planifica tus finanzas de forma visual y sin sorpresas.</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="glass-card">
                    <h3 class="text-center mb-4 fw-bold" style="color: #2d3748;">Simulador de Préstamos</h3>
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-4">
                            <label for="monto" class="form-label">Monto a solicitar:</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-dollar-sign"></i></span>
                                <input type="number" id="monto" class="form-control" value="500000">
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="interes" class="form-label">Tasa Anual:</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-percent"></i></span>
                                <input type="number" id="interes" class="form-control" value="14" step="0.1">
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="meses" class="form-label">Plazo:</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-regular fa-calendar-days"></i></span>
                                <input type="number" id="meses" class="form-control" value="60">
                                <span class="input-group-text" style="border-left: none; border-right: 2px solid #e2e8f0;">meses</span>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Tipo de Institución:</label>
                            <div class="d-flex gap-2">
                                <input type="radio" class="btn-check" name="tipoInstitucion" id="banco" value="banco" checked>
                                <label class="btn btn-outline-custom w-100" for="banco"><i class="fa-solid fa-building-columns"></i> Banco</label>

                                <input type="radio" class="btn-check" name="tipoInstitucion" id="cooperativa" value="cooperativa">
                                <label class="btn btn-outline-custom w-100" for="cooperativa"><i class="fa-solid fa-users"></i> Cooperativa</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Frecuencia de Pago:</label>
                            <div class="d-flex gap-2">
                                <input type="radio" class="btn-check" name="frecuencia" id="mensual" value="mensual" checked>
                                <label class="btn btn-outline-custom w-100" for="mensual"><i class="fa-regular fa-calendar"></i> Mensual</label>

                                <input type="radio" class="btn-check" name="frecuencia" id="quincenal" value="quincenal">
                                <label class="btn btn-outline-custom w-100" for="quincenal"><i class="fa-solid fa-calendar-day"></i> Quincenal</label>
                            </div>
                        </div>
                    </div>

                    <button onclick="calcularCuota()" class="btn-calc w-100">
                        <i class="fa-solid fa-calculator me-2"></i> Calcular Cuota
                    </button>

                    <div id="zona-resultados" style="display: none;" class="fade-in-section">
                        <div class="row mt-5">
                            <div class="col-md-6 mb-4">
                                <div class="result-box h-100 d-flex flex-column justify-content-center">
                                    <span id="texto-pago" class="text-muted d-block mb-2 fw-bold text-uppercase" style="letter-spacing: 1px;">Tu pago estimado</span>
                                    <h2 id="cuota-mensual" class="fw-bold m-0 text-gradient">$0.00</h2>
                                    <hr class="my-3" style="border-color: #c6f6d5;">
                                    <div class="d-flex justify-content-between text-muted small fw-bold">
                                        <span>Total a pagar al final:</span>
                                        <span id="pago-total" style="color: #2d3748;">$0.00</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-6 mb-4">
                                <div class="p-3" style="border: 2px solid #edf2f7; border-radius: 16px; background: #f8fafc; height: 100%;">
                                    <canvas id="graficoResultados" style="max-height: 200px;"></canvas>
                                </div>
                            </div>
                        </div>

                        <div id="tabla-container" class="mt-4">
                            <h4 class="mb-4 text-center fw-bold" style="color: #2d3748;"><i class="fa-solid fa-chart-line me-2 text-success"></i> Desglose de Pagos</h4>
                            <div class="table-responsive" style="max-height: 450px; overflow-y: auto; border-radius: 12px; border: 1px solid #edf2f7;">
                                <table class="table table-hover text-center m-0">
                                    <thead style="position: sticky; top: 0; z-index: 1;">
                                        <tr>
                                            <th id="th-periodo">Período</th>
                                            <th>Cuota</th>
                                            <th>Interés</th>
                                            <th>Capital</th>
                                            <th>Saldo Restante</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla-body">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div> 
                </div>
            </div>
        </div>
    </div>

    <script>

            let frecuencia = document.querySelector('input[name="frecuencia"]:checked').value;
